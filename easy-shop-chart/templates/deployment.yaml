apiVersion: apps/v1
kind: Deployment
metadata:
  name: easy-shop-deployment
  namespace: {{ .Values.namespace }}
  labels:
    app: easy-shop
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: easy-shop
  template:
    metadata:
      labels:
        app: easy-shop
    spec:
      containers:
      - name: easy-shop
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 3000
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        envFrom:
        - configMapRef:
            name: easy-shop-config
        - secretRef:
            name: easy-shop-secret
        resources:
          requests:
            cpu: "{{ .Values.resources.requests.cpu }}"
            memory: "{{ .Values.resources.requests.memory }}"
          limits:
            cpu: "{{ .Values.resources.limits.cpu }}"
            memory: "{{ .Values.resources.limits.memory }}"
